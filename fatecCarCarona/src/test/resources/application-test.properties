# Test Configuration - Using H2 in-memory database
spring.application.name=fatecCarCarona

# H2 Database for testing
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Security
api.security.token.secret=my-secret-key-from-video

# Mongo (disabled for testing)
spring.data.mongodb.uri=mongodb://localhost:27017/backendfateccarona

# Carona auto flow configuration
carona.auto.raio-origem-km=9.0
carona.auto.raio-destino-km=1.0
carona.auto.limite-motoristas-candidatos=3
carona.auto.peso-origem=0.8
carona.auto.peso-destino=0.2
carona.auto.timeout-motorista-segundos=60
carona.auto.limite-tentativas=3

# Tomcat timeout
server.tomcat.connection-timeout=600000
server.tomcat.keep-alive-timeout=600000

